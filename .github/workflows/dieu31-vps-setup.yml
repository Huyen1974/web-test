name: Điều 31 VPS Setup

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action: setup-cron | run-once | check-status'
        required: true
        default: 'run-once'

permissions:
  contents: read

jobs:
  vps-action:
    name: VPS ${{ inputs.action }}
    runs-on: ubuntu-latest

    steps:
      - name: Run integrity runner (first run / test)
        if: inputs.action == 'run-once'
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -euo pipefail
            cd /opt/incomex/deploys/web-test

            # VPS fetches own token from GSM
            export DIRECTUS_TOKEN=$(gcloud secrets versions access latest \
              --secret="DIRECTUS_ADMIN_TOKEN" --project="github-chatgpt-ggcloud" 2>/dev/null || echo "")
            export DIRECTUS_URL=https://directus.incomexsaigoncorp.vn
            export SITE_URL=https://vps.incomexsaigoncorp.vn

            echo "=== Files check ==="
            ls scripts/integrity/main.js scripts/integrity/runners/ web/tests/contracts/ 2>/dev/null && echo "Files OK" || echo "Files MISSING"

            # Find node binary (may be in nvm, docker, or /usr/local/bin)
            NODE_BIN=$(which node 2>/dev/null || ls /usr/local/bin/node 2>/dev/null || ls /root/.nvm/versions/node/*/bin/node 2>/dev/null | tail -1 || echo "")
            if [ -z "$NODE_BIN" ]; then
              echo "Node not found on host. Installing via nvm..."
              curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
              nvm install 20
              NODE_BIN=$(which node)
            fi
            echo "Node: $($NODE_BIN --version)"

            echo ""
            echo "=== Running integrity runner ==="
            RUN_ID="gh-dispatch-$(date +%Y%m%d-%H%M%S)"
            $NODE_BIN scripts/integrity/main.js --tier=A --run-id="$RUN_ID" || true

            echo ""
            echo "=== Checking WATCHDOG issue ==="
            curl -sf "$DIRECTUS_URL/items/system_issues?filter[source_system][_eq]=dieu31-runner&filter[issue_class][_eq]=watchdog_fault&limit=1&sort=-last_seen_at&fields=id,title,violation_hash,occurrence_count,last_seen_at" \
              -H "Authorization: Bearer $DIRECTUS_TOKEN" | python3 -c "
            import sys, json
            d = json.load(sys.stdin)
            items = d.get('data', [])
            if items:
                w = items[0]
                print(f'WATCHDOG issue: #{w[\"id\"]} — count={w[\"occurrence_count\"]} — last={w[\"last_seen_at\"]}')
            else:
                print('WATCHDOG: NO ISSUE FOUND')
            " || echo "Could not query WATCHDOG"

      - name: Setup cron + WATCHDOG monitor
        if: inputs.action == 'setup-cron'
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            echo "=== Setting up cron ==="
            mkdir -p /opt/incomex/logs/integrity

            # Make scripts executable
            chmod +x /opt/incomex/deploys/web-test/scripts/integrity/*.sh 2>/dev/null || true

            # Backup current crontab
            crontab -l > /tmp/crontab-backup-$(date +%Y%m%d) 2>/dev/null || true

            # Remove old integrity entries if any, build new
            (crontab -l 2>/dev/null || true) | grep -v "integrity" | grep -v "WATCHDOG" > /tmp/crontab-clean || true

            # Add entries
            echo "# Điều 31 — Daily Integrity Audit (3AM VN = 20:00 UTC)" >> /tmp/crontab-clean
            echo "0 20 * * * /opt/incomex/deploys/web-test/scripts/integrity/cron-integrity.sh >> /opt/incomex/logs/integrity/cron.log 2>&1" >> /tmp/crontab-clean
            echo "# WATCHDOG Monitor — hourly" >> /tmp/crontab-clean
            echo "0 * * * * /opt/incomex/deploys/web-test/scripts/integrity/watchdog-monitor.sh >> /opt/incomex/logs/integrity/watchdog.log 2>&1" >> /tmp/crontab-clean

            crontab /tmp/crontab-clean
            rm -f /tmp/crontab-clean

            echo "=== Crontab installed ==="
            crontab -l | grep -E "integrity|WATCHDOG"

      - name: Check status
        if: inputs.action == 'check-status'
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== Crontab ==="
            crontab -l 2>/dev/null | grep -E "integrity|WATCHDOG" || echo "No integrity cron entries"

            echo ""
            echo "=== Recent logs ==="
            ls -lt /opt/incomex/logs/integrity/ 2>/dev/null | head -10 || echo "No logs"

            echo ""
            echo "=== Scripts ==="
            ls -la /opt/incomex/deploys/web-test/scripts/integrity/ 2>/dev/null || echo "Scripts not found"

            echo ""
            echo "=== Contracts ==="
            ls /opt/incomex/deploys/web-test/web/tests/contracts/*.json 2>/dev/null | wc -l | xargs -I{} echo "{} contract files found"
