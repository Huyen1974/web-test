name: Health Check

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  VPS_DIRECTUS_URL: "https://directus.incomexsaigoncorp.vn"
  VPS_AGENT_DATA_URL: "https://vps.incomexsaigoncorp.vn/api"
  WEBSITE_URL: "https://vps.incomexsaigoncorp.vn"
  AGENT_DATA_API_KEY: ${{ secrets.AGENT_DATA_API_KEY }}

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "CHECK 1 — Services Alive"
        run: |
          echo "=== CHECK 1: Services Alive ==="
          FAILED=0

          echo -n "Nuxt (website)......... "
          HTTP=$(curl -s -L -o /dev/null -w "%{http_code}" --max-time 20 "$WEBSITE_URL/" 2>/dev/null || echo "000")
          if [ "$HTTP" = "200" ]; then echo "OK ($HTTP)"; else echo "FAIL ($HTTP)"; FAILED=1; fi

          echo -n "Directus............... "
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$VPS_DIRECTUS_URL/server/health" 2>/dev/null || echo "000")
          if [ "$HTTP" = "200" ]; then echo "OK ($HTTP)"; else echo "FAIL ($HTTP)"; FAILED=1; fi

          echo -n "Agent Data............. "
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$VPS_AGENT_DATA_URL/health" 2>/dev/null || echo "000")
          if [ "$HTTP" = "200" ]; then echo "OK ($HTTP)"; else echo "FAIL ($HTTP)"; FAILED=1; fi

          echo -n "Qdrant (via health).... "
          QDRANT=$(curl -s --max-time 15 "$VPS_AGENT_DATA_URL/health" 2>/dev/null | jq -r '.services.qdrant.status // "unknown"')
          if [ "$QDRANT" = "ok" ]; then echo "OK"; else echo "FAIL ($QDRANT)"; FAILED=1; fi

          if [ $FAILED -ne 0 ]; then echo "::error::CHECK 1 FAILED — services down"; exit 1; fi
          echo "CHECK 1: PASS"

      - name: "CHECK 2 — Data Integrity"
        run: |
          echo "=== CHECK 2: Data Integrity ==="
          FAILED=0

          # Get Agent Data counts
          AD_BODY=$(curl -s --max-time 15 "$VPS_AGENT_DATA_URL/health" 2>/dev/null)
          AD_DOCS=$(echo "$AD_BODY" | jq -r '.data_integrity.document_count // 0')
          AD_VECTORS=$(echo "$AD_BODY" | jq -r '.data_integrity.vector_point_count // 0')
          AD_RATIO=$(echo "$AD_BODY" | jq -r '.data_integrity.ratio // 0')
          AD_SYNC=$(echo "$AD_BODY" | jq -r '.data_integrity.sync_status // "unknown"')

          # Get Directus count
          DIR_BODY=$(curl -s --max-time 15 "$VPS_DIRECTUS_URL/items/knowledge_documents?aggregate%5Bcount%5D=id" 2>/dev/null)
          DIR_COUNT=$(echo "$DIR_BODY" | jq -r '.data[0].count.id // 0')

          echo "Agent Data: $AD_DOCS docs, $AD_VECTORS vectors, ratio $AD_RATIO, sync $AD_SYNC"
          echo "Directus:   $DIR_COUNT records"

          # Check 1: doc/vector ratio (2.5-4.5 is healthy)
          echo -n "Vector ratio........... "
          RATIO_OK=$(echo "$AD_RATIO" | awk '{if ($1 >= 2.5 && $1 <= 4.5) print "yes"; else print "no"}')
          if [ "$RATIO_OK" = "yes" ]; then echo "OK ($AD_RATIO)"; else echo "WARN ($AD_RATIO — expected 2.5-4.5)"; fi

          # Check 2: sync status
          echo -n "Sync status............ "
          if [ "$AD_SYNC" = "ok" ]; then echo "OK"; else echo "FAIL ($AD_SYNC)"; FAILED=1; fi

          # Check 3: counts not zero
          echo -n "Document count......... "
          if [ "$AD_DOCS" -gt 50 ] 2>/dev/null; then echo "OK ($AD_DOCS)"; else echo "FAIL ($AD_DOCS — expected >50)"; FAILED=1; fi

          echo -n "Directus count......... "
          if [ "$DIR_COUNT" -gt 50 ] 2>/dev/null; then echo "OK ($DIR_COUNT)"; else echo "WARN ($DIR_COUNT — expected >50)"; fi

          if [ $FAILED -ne 0 ]; then echo "::error::CHECK 2 FAILED — data integrity issue"; exit 1; fi
          echo "CHECK 2: PASS"

      - name: "CHECK 3 — Content Verification"
        run: |
          echo "=== CHECK 3: Content Verification ==="
          FAILED=0

          # Get 3 published docs from Directus with file_path
          DOCS=$(curl -s --max-time 15 "$VPS_DIRECTUS_URL/items/knowledge_documents?filter%5Bstatus%5D%5B_eq%5D=published&filter%5Bis_current_version%5D%5B_eq%5D=true&filter%5Bis_folder%5D%5B_eq%5D=false&fields=title,file_path&sort=title&limit=3" 2>/dev/null)

          for i in 0 1 2; do
            TITLE=$(echo "$DOCS" | jq -r ".data[$i].title // \"\"")
            FPATH=$(echo "$DOCS" | jq -r ".data[$i].file_path // \"\"")
            if [ -z "$FPATH" ]; then continue; fi

            # Build clean URL: strip knowledge/ or docs/ prefix and .md suffix
            CLEAN=$(echo "$FPATH" | sed 's|^knowledge/||;s|^docs/||;s|\.md$||')
            URL="$WEBSITE_URL/knowledge/$CLEAN"

            echo -n "Page: $TITLE... "
            HTTP=$(curl -s -L -o /dev/null -w "%{http_code}" --max-time 20 "$URL" 2>/dev/null || echo "000")
            BODY=$(curl -s -L --max-time 20 "$URL" 2>/dev/null)
            NOT_FOUND=$(echo "$BODY" | grep -c "Document not found" || true)

            if [ "$HTTP" = "200" ] && [ "$NOT_FOUND" = "0" ]; then
              echo "OK ($HTTP)"
            else
              echo "FAIL ($HTTP, not_found=$NOT_FOUND)"
              FAILED=1
            fi
          done

          if [ $FAILED -ne 0 ]; then echo "::error::CHECK 3 FAILED — content pages broken"; exit 1; fi
          echo "CHECK 3: PASS"

      - name: "CHECK 4 — Cache CDN"
        run: |
          echo "=== CHECK 4: Cache CDN ==="
          FAILED=0

          echo -n "Cache headers.......... "
          HEADERS=$(curl -sI -L --max-time 15 "$WEBSITE_URL/knowledge/" 2>/dev/null)
          HAS_CACHE=$(echo "$HEADERS" | grep -ic 'cache-control.*s-maxage' || true)
          if [ "$HAS_CACHE" -gt 0 ]; then
            CACHE_VAL=$(echo "$HEADERS" | grep -i 'cache-control' | head -1 | tr -d '\r')
            echo "OK ($CACHE_VAL)"
          else
            echo "WARN (no s-maxage header)"
          fi

          echo -n "CDN serving............ "
          X_CACHE=$(echo "$HEADERS" | grep -i 'x-cache' | head -1 | tr -d '\r')
          if [ -n "$X_CACHE" ]; then
            echo "OK ($X_CACHE)"
          else
            echo "WARN (no x-cache header)"
          fi

          echo -n "No set-cookie leak..... "
          SET_COOKIE=$(echo "$HEADERS" | grep -ic 'set-cookie' || true)
          if [ "$SET_COOKIE" = "0" ]; then echo "OK"; else echo "WARN (set-cookie present)"; fi

          echo "CHECK 4: PASS"

      - name: "CHECK 5 — Vector Search"
        run: |
          echo "=== CHECK 5: Vector Search ==="
          FAILED=0

          echo -n "Search query........... "
          RESULT=$(curl -s --max-time 30 -X POST "$VPS_AGENT_DATA_URL/chat" \
            -H 'Content-Type: application/json' \
            -H "X-API-Key: $AGENT_DATA_API_KEY" \
            -d '{"message":"kiến trúc hệ thống"}' 2>/dev/null)

          # Strip ANSI codes and parse
          CLEAN=$(echo "$RESULT" | sed 's/\x1b\[[0-9;]*m//g')
          CTX_COUNT=$(echo "$CLEAN" | jq -r '.context | length // 0' 2>/dev/null || echo "0")

          if [ "$CTX_COUNT" -gt 0 ] 2>/dev/null; then
            FIRST=$(echo "$CLEAN" | jq -r '.context[0].document_id // "?"' 2>/dev/null)
            echo "OK ($CTX_COUNT results, first: $FIRST)"
          else
            echo "FAIL (0 results)"
            FAILED=1
          fi

          if [ $FAILED -ne 0 ]; then echo "::error::CHECK 5 FAILED — vector search broken"; exit 1; fi
          echo "CHECK 5: PASS"

      - name: "CHECK 6 — Directus Health"
        run: |
          echo "=== CHECK 6: Directus Health ==="
          FAILED=0

          # Directus server health (public endpoint, no auth needed)
          echo -n "Directus server........ "
          DX_HEALTH=$(curl -s --max-time 15 "$VPS_DIRECTUS_URL/server/health" 2>/dev/null)
          DX_STATUS=$(echo "$DX_HEALTH" | jq -r '.status // "unknown"' 2>/dev/null)
          if [ "$DX_STATUS" = "ok" ]; then
            echo "OK"
          else
            echo "FAIL ($DX_STATUS)"
            FAILED=1
          fi

          # Verify public collections accessible (SSR needs these)
          echo -n "Public collections...... "
          PUB_COUNT=$(curl -s --max-time 15 "$VPS_DIRECTUS_URL/items/v_registry_counts?limit=1" 2>/dev/null | jq '.data | length' 2>/dev/null || echo "0")
          if [ "$PUB_COUNT" -ge 1 ] 2>/dev/null; then
            echo "OK (v_registry_counts accessible)"
          else
            echo "WARN (v_registry_counts not accessible)"
          fi

          # Verify flows NOT publicly accessible (security)
          echo -n "Flows secured.......... "
          FLOW_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$VPS_DIRECTUS_URL/flows" 2>/dev/null)
          if [ "$FLOW_CODE" = "403" ] || [ "$FLOW_CODE" = "401" ]; then
            echo "OK (HTTP $FLOW_CODE — properly secured)"
          else
            echo "WARN (HTTP $FLOW_CODE — flows may be publicly accessible)"
          fi

          if [ $FAILED -ne 0 ]; then echo "::error::CHECK 6 FAILED — Directus health issue"; exit 1; fi
          echo "CHECK 6: PASS"

      - name: "CHECK 7 — Knowledge Structure Validation"
        run: |
          echo "=== CHECK 7: Knowledge Structure Validation ==="
          FAILED=0

          # Allowed top-level folders under knowledge/ (KS-LAW v1.0 §2)
          # Read from config file to avoid hardcoding (TD-053)
          ALLOWED=$(jq -r '.allowed | join(" ")' .sync-allowed-folders.json 2>/dev/null || echo "current-state current-tasks dev ops other")

          # Get all document IDs and extract top-level folders
          DOCS=$(curl -s --max-time 15 -H "X-API-Key: $AGENT_DATA_API_KEY" "$VPS_AGENT_DATA_URL/kb/list" 2>/dev/null)
          FOLDERS=$(echo "$DOCS" | jq -r '
            [.items[] | .document_id // "" |
              select(startswith("knowledge/")) |
              split("/")[1]] |
            unique | .[]' 2>/dev/null)

          echo -n "Top-level folders...... "
          VIOLATIONS=""
          for folder in $FOLDERS; do
            if ! echo "$ALLOWED" | grep -qw "$folder"; then
              VIOLATIONS="$VIOLATIONS $folder"
            fi
          done

          if [ -z "$VIOLATIONS" ]; then
            echo "OK ($(echo $FOLDERS | wc -w | tr -d ' ') folders, all valid)"
            echo "  Folders: $FOLDERS"
          else
            echo "FAIL — rogue folders found:$VIOLATIONS"
            echo "  Expected: $ALLOWED"
            echo "  Found: $FOLDERS"
            FAILED=1
          fi

          if [ $FAILED -ne 0 ]; then echo "::error::CHECK 7 FAILED — unauthorized knowledge folders"; exit 1; fi
          echo "CHECK 7: PASS"

      - name: "CHECK 8 — AD↔Directus Sync Gap"
        run: |
          echo "=== CHECK 8: AD↔Directus Sync Gap ==="
          FAILED=0

          # Count non-folder knowledge docs in Agent Data
          AD_LIST=$(curl -s --max-time 15 -H "X-API-Key: $AGENT_DATA_API_KEY" "$VPS_AGENT_DATA_URL/kb/list" 2>/dev/null)
          AD_COUNT=$(echo "$AD_LIST" | jq '[.items[] | select(.document_id // "" | startswith("knowledge/")) | select(.is_folder != true)] | length' 2>/dev/null || echo "0")

          # Count non-folder knowledge docs in Directus
          DX_COUNT=$(curl -s --max-time 15 "$VPS_DIRECTUS_URL/items/knowledge_documents?filter%5Bis_folder%5D%5B_eq%5D=false&aggregate%5Bcount%5D=id" 2>/dev/null | jq -r '.data[0].count.id // 0')

          # Calculate gap (Directus may have extra docs, so use absolute diff)
          if [ "$AD_COUNT" -gt "$DX_COUNT" ] 2>/dev/null; then
            GAP=$((AD_COUNT - DX_COUNT))
          else
            GAP=$((DX_COUNT - AD_COUNT))
          fi

          echo "Agent Data knowledge docs: $AD_COUNT"
          echo "Directus knowledge docs:   $DX_COUNT"
          echo "Gap:                       $GAP"

          echo -n "Sync gap............... "
          if [ "$GAP" -eq 0 ] 2>/dev/null; then
            echo "OK (0 gap)"
          elif [ "$GAP" -le 10 ] 2>/dev/null; then
            echo "WARN ($GAP docs gap — reconcile may be pending)"
          else
            echo "FAIL ($GAP docs gap — expected <=10)"
            FAILED=1
          fi

          if [ $FAILED -ne 0 ]; then echo "::error::CHECK 8 FAILED — AD↔Directus sync gap too large"; exit 1; fi
          echo "CHECK 8: PASS"

      - name: "CHECK 9 — Registry Count Integrity"
        run: |
          echo "=== CHECK 9: Registry Count Integrity ==="
          FAILED=0

          # verify_counts() via Directus SQL (public v_registry_counts)
          echo -n "Registry counts........ "
          COUNTS=$(curl -s --max-time 15 "$VPS_DIRECTUS_URL/items/v_registry_counts?fields=cat_code,record_count,orphan_count&limit=-1" 2>/dev/null)
          TOTAL=$(echo "$COUNTS" | jq '.data | length' 2>/dev/null || echo "0")

          if [ "$TOTAL" -ge 15 ] 2>/dev/null; then
            echo "OK ($TOTAL collections tracked)"
          else
            echo "FAIL ($TOTAL collections — expected >=15)"
            FAILED=1
          fi

          # Check DOT tools count > 100
          echo -n "DOT tools count........ "
          DOT_COUNT=$(echo "$COUNTS" | jq '[.data[] | select(.cat_code == "CAT-006")] | .[0].record_count // 0' 2>/dev/null || echo "0")
          if [ "$DOT_COUNT" -ge 100 ] 2>/dev/null; then
            echo "OK ($DOT_COUNT)"
          else
            echo "WARN ($DOT_COUNT — expected >=100)"
          fi

          # Check taxonomy labels exist
          echo -n "Taxonomy labels........ "
          TAX_COUNT=$(echo "$COUNTS" | jq '[.data[] | select(.cat_code == "CAT-018")] | .[0].record_count // 0' 2>/dev/null || echo "0")
          if [ "$TAX_COUNT" -ge 50 ] 2>/dev/null; then
            echo "OK ($TAX_COUNT)"
          else
            echo "WARN ($TAX_COUNT — expected >=50)"
          fi

          if [ $FAILED -ne 0 ]; then echo "::error::CHECK 9 FAILED — registry count integrity issue"; exit 1; fi
          echo "CHECK 9: PASS"

      - name: "CHECK 10 — Dead Links Monitor"
        run: |
          echo "=== CHECK 10: Dead Links Monitor ==="
          FAILED=0

          # Count orphan_count across all collections (sum from v_registry_counts)
          echo -n "Total orphans.......... "
          ORPHAN_SUM=$(curl -s --max-time 15 "$VPS_DIRECTUS_URL/items/v_registry_counts?fields=orphan_count&limit=-1" 2>/dev/null \
            | jq '[.data[].orphan_count] | add // 0' 2>/dev/null || echo "0")
          if [ "$ORPHAN_SUM" -le 5 ] 2>/dev/null; then
            echo "OK ($ORPHAN_SUM orphans)"
          elif [ "$ORPHAN_SUM" -le 20 ] 2>/dev/null; then
            echo "WARN ($ORPHAN_SUM orphans — some collections have missing codes)"
          else
            echo "FAIL ($ORPHAN_SUM orphans — too many missing codes)"
            FAILED=1
          fi

          # Check system_issues open count (spike detection)
          echo -n "Open issues............ "
          ISS_COUNT=$(curl -s --max-time 15 "$VPS_DIRECTUS_URL/items/v_registry_counts?fields=record_count&filter%5Bcat_code%5D%5B_eq%5D=CAT-017&limit=1" 2>/dev/null \
            | jq '.data[0].record_count // 0' 2>/dev/null || echo "0")
          if [ "$ISS_COUNT" -le 1000 ] 2>/dev/null; then
            echo "OK ($ISS_COUNT open)"
          else
            echo "WARN ($ISS_COUNT open — may need triage)"
          fi

          if [ $FAILED -ne 0 ]; then echo "::error::CHECK 10 FAILED — data quality issue"; exit 1; fi
          echo "CHECK 10: PASS"

      - name: Summary
        if: always()
        run: |
          echo ""
          echo "========================================"
          echo "  HEALTH CHECK COMPLETE"
          echo "========================================"
          echo "  Checks: Services, Data, Content, Cache, Search, Flows, Structure, Sync, Registry, Quality"
          echo "  VPS: $VPS_AGENT_DATA_URL"
          echo "  Web: $WEBSITE_URL"
          echo "========================================"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "::error::Health check failed! VPS infrastructure may have issues."
          echo "Check the logs above for details."
          echo ""
          echo "Directus: $VPS_DIRECTUS_URL"
          echo "Agent Data: $VPS_AGENT_DATA_URL"
          echo "Website: $WEBSITE_URL"
