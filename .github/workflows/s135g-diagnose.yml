name: "S135G: Diagnose + Fix Homepage & Nav"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose-fix:
    name: SSH Diagnose + Fix
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose and fix
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -euo pipefail
            
            echo "=== 1. Test homepage via Nuxt directly (bypass nginx) ==="
            HP_CODE=$(docker exec incomex-nuxt sh -c 'wget -q -O /dev/null -S "http://localhost:3000/" 2>&1 | grep "HTTP/" | tail -1 | awk "{print \$2}"' 2>/dev/null || echo "FAIL")
            echo "Homepage via Nuxt direct: $HP_CODE"
            
            echo ""
            echo "=== 2. Test debug endpoint via Nuxt directly ==="
            docker exec incomex-nuxt sh -c 'wget -q -O - "http://localhost:3000/api/debug/homepage" 2>&1' || echo "Debug endpoint FAILED"
            
            echo ""
            echo "=== 3. Nuxt full error log for homepage ==="
            docker exec incomex-nuxt sh -c 'wget -q -O - "http://localhost:3000/" 2>&1' | head -20 || echo "FAILED"
            
            echo ""
            echo "=== 4. Nuxt container FULL logs (last 50) ==="
            docker logs --tail 50 incomex-nuxt 2>&1
            
            echo ""
            echo "=== 5. Navigation data via postgres ==="
            docker exec postgres psql -U workflow_admin -d workflow -c "SELECT navigation_id, navigation_items_id FROM navigation_navigation_items;" 2>/dev/null || echo "Query failed"
            docker exec postgres psql -U workflow_admin -d workflow -c "SELECT id, title, type, url FROM navigation_items WHERE id IN (SELECT navigation_items_id FROM navigation_navigation_items);" 2>/dev/null || echo "Query failed"

            echo ""
            echo "=== 6. Check pages_blocks junction ==="
            docker exec postgres psql -U workflow_admin -d workflow -c "SELECT id, collection, item, pages_id FROM pages_blocks WHERE pages_id = '0ea2e35a-04e2-4f90-aee1-aaa23dce231b' LIMIT 5;" 2>/dev/null || echo "Query failed"
