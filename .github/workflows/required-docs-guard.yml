name: required-docs-guard
on:
  pull_request:
  push:
jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Ensure required docs exist
        run: |
          test -f docs/dev/blueprints/BUSINESS_OS_BLUEPRINT.md
          test -f docs/dev/blueprints/BUSINESS_OS_BLUEPRINT_Ver.OPUS.md
