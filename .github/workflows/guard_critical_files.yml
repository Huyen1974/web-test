name: Critical File Guard

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-critical-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Check for required files
        run: |
          REQUIRED_FILES=(
            "docs/dev/blueprints/BUSINESS_OS_BLUEPRINT.md"
            "docs/ssot/constitution.md"
            "web/tests/contracts/registries.json"
            "web/tests/contracts/species-matrix.json"
            "web/tests/contracts/health.json"
            ".github/workflows/e2e-test.yml"
            ".github/workflows/post-deploy-e2e.yml"
            "scripts/smoke-test.sh"
          )

          MISSING_FILES=0

          for FILE in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$FILE" ]; then
              echo "::error::Critical file missing: $FILE"
              MISSING_FILES=1
            else
              echo "✅ Found: $FILE"
            fi
          done
          
          if [ "$MISSING_FILES" -eq 1 ]; then
            echo "::error::One or more critical files are missing. This PR cannot be merged."
            exit 1
          fi

      - name: Verify workflow invariants
        run: |
          # Prevent PR#567-style regression: agent rewrites workflow file,
          # removing critical triggers/features while file still exists.
          # Each entry: "file|required_pattern|description"
          WORKFLOW_CHECKS=(
            ".github/workflows/post-deploy-e2e.yml|workflow_run:|must have workflow_run trigger (post-deploy chain)"
            ".github/workflows/post-deploy-e2e.yml|Deploy to VPS|must trigger after Deploy to VPS"
            ".github/workflows/post-deploy-e2e.yml|smoke-test.sh|must run smoke-test.sh"
            ".github/workflows/e2e-test.yml|push:|must trigger on push to main"
            ".github/workflows/e2e-test.yml|pull_request:|must trigger on pull_request"
            ".github/workflows/e2e-test.yml|test:e2e|must run Playwright E2E tests"
            ".github/workflows/deploy-vps.yml|workflow_run:|must have workflow_run trigger"
            ".github/workflows/deploy-vps.yml|Nuxt 3 CI|must trigger after Nuxt 3 CI"
          )

          FAILED=0
          for CHECK in "${WORKFLOW_CHECKS[@]}"; do
            IFS='|' read -r FILE PATTERN DESC <<< "$CHECK"
            if [ ! -f "$FILE" ]; then
              echo "::error::$FILE missing — $DESC"
              FAILED=1
            elif ! grep -q "$PATTERN" "$FILE"; then
              echo "::error::$FILE — $DESC (pattern '$PATTERN' not found)"
              FAILED=1
            else
              echo "✅ $FILE: $DESC"
            fi
          done

          if [ "$FAILED" -ne 0 ]; then
            echo "::error::Workflow invariant check failed. A critical trigger or feature may have been removed."
            exit 1
          fi
          echo "✅ All workflow invariants intact"

      - name: Verify contracts not weakened
        run: |
          python3 - <<'PY'
          import json
          import sys
          from pathlib import Path

          contract_paths = [
              Path("web/tests/contracts/registries.json"),
              Path("web/tests/contracts/species-matrix.json"),
              Path("web/tests/contracts/health.json"),
          ]

          failures = []

          for path in contract_paths:
              data = json.loads(path.read_text(encoding="utf-8"))
              columns = len(data.get("columns", []))
              required_rows = len(data.get("required_rows", []))
              required_text = len(data.get("required_text", []))
              cards = len(data.get("cards", []))
              required_links = len(data.get("required_links", []))
              invariants = required_rows + required_text + cards + required_links

              print(
                  f"Contract {path}: columns={columns}, "
                  f"required_rows={required_rows}, required_text={required_text}, "
                  f"cards={cards}, required_links={required_links}"
              )

              if columns < 3:
                  failures.append(f"{path} has fewer than 3 columns")

              if required_rows > 0 and required_rows < 3:
                  failures.append(f"{path} has fewer than 3 required rows")

              if invariants < 1:
                  failures.append(f"{path} has no content invariants")

          if failures:
              for failure in failures:
                  print(f"::error::{failure}")
              print("::error::One or more contracts look weakened.")
              sys.exit(1)

          print("✅ All contracts meet minimum coverage requirements")
          PY
