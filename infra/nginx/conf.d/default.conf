        add_header Access-Control-Allow-Headers "Content-Type, X-API-Key, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        limit_req zone=ops_limit burst=20 nodelay;

        rewrite ^/ops/(.*) /$1 break;

